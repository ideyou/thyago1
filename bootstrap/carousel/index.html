.hero{
height:100vh;

}

.info h1{

}

.info h2{

}

}

.stat span{
font-size:50px;

}

.fighter{
height:1250px;
width:auto;
max-width:none;

}

@keyframes flutuar{
50%{transform:translateY(-15px);}
}

.galeria img{
width:255px;
height:300px;
object-fit:cover;
border-radius:19px;
transition:0.4s;
transform:none;
}

.record{
    position:relative;
    left:-499px;
}

.record img{
display:block;
margin:auto;
width:100VW;
max-width:none;
height:auto;

}
.galeria img:hover{
transform:scale(1.05);
}

footer{
text-align:center;
padding:0px;
}

.historico{
    background:#B8B8B8;
    padding:80px 0;
}

.titulo-HISTÓRICO{
    color:#000000;
    text-align:center;
    font-size:20px;
    margin-bottom:30px;
    font-weight:100;
}

.historico img{
display:block;
margin:auto;
width:110VW;
max-width:9000px;
height:auto;
transform:none;
margin-left:-450px;
border-radius:15px;
}
